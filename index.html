<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>حباب‌سنج | محاسبه‌گر حباب طلا و سکه</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
  <!-- آیکون‌ها از jsDelivr — دامنهٔ fonts.googleapis.com از ایران بدون فیلترشکن باز نمی‌شود -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/material-symbols@latest/rounded.css">
  <!-- با هر آپدیت، عدد v را یک واحد بالا ببر تا مرورگر کاربر نسخهٔ جدید را بدون پاک کردن کش بگیرد -->
  <link rel="stylesheet" href="styles.css?v=2">

  <!-- ایمپورت مستقیم باندل‌شده؛ بدون importmap تا در وب‌ویوهای قدیمی هم کار کند -->
  <script type="module" src="https://esm.run/@material/web/all.js"></script>
  <script type="module" src="app.js?v=2"></script>
</head>
<body>
  <main class="card">
    <header>
      <md-icon class="logo">bubble_chart</md-icon>
      <h1>حباب‌سنج</h1>
      <md-icon-button id="themeBtn" title="پوستهٔ روشن/تاریک"><md-icon id="themeIcon">dark_mode</md-icon></md-icon-button>
      <md-icon-button id="sync" title="دریافت قیمت لحظه‌ای"><md-icon>sync</md-icon></md-icon-button>
    </header>
    <p class="subtitle">محاسبه‌گر حباب طلا و سکه</p>

    <div class="segmented">
      <button type="button" class="seg active" data-mode="mesghal">مظنه (مثقال)</button>
      <button type="button" class="seg" data-mode="geram">گرم ۱۸ عیار</button>
    </div>

    <md-outlined-text-field id="gold" label="مظنه بازار تهران (تومان)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">paid</md-icon>
    </md-outlined-text-field>

    <md-outlined-text-field id="ons" label="انس جهانی (دلار)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">public</md-icon>
    </md-outlined-text-field>

    <md-outlined-text-field id="usd" label="قیمت دلار (تومان)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">attach_money</md-icon>
    </md-outlined-text-field>

    <md-filled-button id="calcBtn"><md-icon slot="icon">calculate</md-icon>محاسبهٔ حباب</md-filled-button>

    <section id="out">
      <div class="row"><span id="zatiLabel"></span><b id="zati"></b></div>
      <div id="hobab" class="hobab"></div>
    </section>
  </main>
</body>
</html>
