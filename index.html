<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>حباب | ارزش ذاتی طلا و نقره</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
  <!-- آیکون‌ ها از jsDelivr — دامنهٔ fonts.googleapis.com از ایران بدون فیلترشکن باز نمی‌شود -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/material-symbols@latest/rounded.css">
  <!-- نسخه فقط در app.js تعریف می‌شود؛ تازه‌سازی فایل‌ها را کشِ نسخه‌دار سرویس‌ورکر انجام می‌دهد -->
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#565992">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <!-- نصب تمام‌صفحه: متای استاندارد + نسخهٔ مخصوص اپل، و استایل نوار وضعیت iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- متا برای موتورهای جستجو و پیش‌نمایش لینک در پیام‌رسان‌ها -->
  <meta name="description" content="حباب — اعلام‌گر ارزش ذاتی طلا و نقره بر پایهٔ انس جهانی و دلار بازار آزاد">
  <meta property="og:title" content="حباب | ارزش ذاتی طلا و نقره">
  <meta property="og:description" content="ارزش ذاتی مثقال، گرم ۱۸ عیار و شمش نقره — زنده از انس جهانی">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://khodemesbah.github.io/Hobab/">
  <meta property="og:image" content="https://khodemesbah.github.io/Hobab/icons/apple-touch-icon.png">
  <meta name="twitter:card" content="summary">

  <!-- ایمپورت مستقیم باندل‌شده؛ بدون importmap تا در وب‌ویوهای قدیمی هم کار کند -->
  <script type="module" src="https://esm.run/@material/web/all.js"></script>
  <script type="module" src="app.js"></script>
</head>
<body>
  <main class="card">
    <header>
      <md-icon class="logo">bubble_chart</md-icon>
      <h1><span id="appName">حباب</span></h1>
      <div class="badges"><span id="offBadge" class="badge off" hidden>آفلاین</span><span id="verBadge" class="badge"></span></div>
      <md-icon-button id="langBtn" title="English / فارسی"><md-icon>language</md-icon></md-icon-button>
      <md-icon-button id="themeBtn" title="پوستهٔ روشن/تاریک"><md-icon id="themeIcon">dark_mode</md-icon></md-icon-button>
    </header>
    <p class="subtitle" id="subtitle">اعلام ارزش ذاتی طلا و نقره</p>

    <!-- کارت وضعیت بازار جهانی — با حالت خطا و تلاش مجدد -->
    <div id="marketCard" class="market" aria-live="polite">
      <div class="market-info">
        <!-- اسکلتون لودینگ تا رسیدن اولین داده -->
        <div id="marketSkl"><div class="skl-line w55"></div><div class="skl-line w75"></div></div>
        <!-- آیکون وضعیت دقیقاً کنار برچسب، نه بین برچسب و ساعت به‌روزرسانی -->
        <div class="market-head" id="marketHead" hidden><md-icon id="marketIcon">schedule</md-icon><b id="marketLabel"></b></div>
        <span id="marketTimes"></span>
      </div>
      <md-icon-button id="marketRetry" style="display:none" title="تلاش مجدد / Retry"><md-icon>refresh</md-icon></md-icon-button>
    </div>

    <md-tabs id="nav">
      <!-- خانوادهٔ آیکون اختصاصی «فلز درخشان»: سکهٔ طلا و شمش نقره، هر دو با برق چهارپر متریال — رنگ از تم -->
      <md-primary-tab inline-icon>
        <md-icon slot="icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M11 21a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm0-3.2a4.8 4.8 0 1 0 0-9.6 4.8 4.8 0 0 0 0 9.6Z"/><path d="M18.5 2l.9 2.6 2.6.9-2.6.9-.9 2.6-.9-2.6-2.6-.9 2.6-.9.9-2.6Z"/></svg></md-icon>
        <span id="tabGoldLabel">طلا</span>
      </md-primary-tab>
      <md-primary-tab inline-icon>
        <md-icon slot="icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M9.2 5h4.6a1.1 1.1 0 0 1 1.05.77l1 3A1.1 1.1 0 0 1 14.8 10.2H7.2a1.1 1.1 0 0 1-1.05-1.43l1-3A1.1 1.1 0 0 1 9.2 5Z"/><path d="M7.2 12.5h8.6a1.2 1.2 0 0 1 1.14.83l1.15 3.4a1.2 1.2 0 0 1-1.14 1.57H6.05a1.2 1.2 0 0 1-1.14-1.57l1.15-3.4a1.2 1.2 0 0 1 1.14-.83Z"/><path d="M19 2.5l.8 2.2 2.2.8-2.2.8-.8 2.2-.8-2.2-2.2-.8 2.2-.8.8-2.2Z"/></svg></md-icon>
        <span id="tabSilverLabel">نقره</span>
      </md-primary-tab>
    </md-tabs>

    <section id="view-gold">

    <md-outlined-text-field id="ons" label="انس جهانی طلا (دلار)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">public</md-icon>
      <md-icon-button id="fetchXau" slot="trailing-icon" title="دریافت از API"><md-icon>sync</md-icon></md-icon-button>
    </md-outlined-text-field>

    <md-outlined-text-field id="usd" label="قیمت دلار بازار آزاد (تومان)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">attach_money</md-icon>
    </md-outlined-text-field>

    <!-- کارت نتیجه — مهم‌ترین عدد صفحه -->
    <section id="out" aria-live="polite">
      <div class="result-card">
        <div class="result-head"><md-icon>paid</md-icon><span id="rowMesghalLabel">ارزش ذاتی مثقال</span></div>
        <div class="result-main" id="zatiMesghal"></div>
        <div class="result-sub"><span id="rowGeramLabel">ارزش ذاتی گرم ۱۸ عیار</span><b id="zatiGeram"></b></div>
      </div>
    </section>

    </section>

    <section id="view-silver" hidden>

    <md-outlined-text-field id="xag" label="انس جهانی نقره (دلار)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">public</md-icon>
      <md-icon-button id="fetchXag" slot="trailing-icon" title="دریافت از API"><md-icon>sync</md-icon></md-icon-button>
    </md-outlined-text-field>

    <!-- اسکلتون کارت نتیجهٔ نقره تا پایان دریافت خودکار -->
    <div id="xagSkl" class="skl-card" hidden>
      <div class="skl-line w40"></div>
      <div class="skl-line w65 tall"></div>
    </div>

    <section id="silverOut" style="display:none" aria-live="polite">
      <div class="result-card">
        <div class="result-head"><md-icon>diamond</md-icon><span id="silverRowLabel">ارزش ذاتی شمش یک‌کیلویی ۹۹۹</span></div>
        <div class="result-main" id="silverVal"></div>
      </div>
    </section>

    </section>


  </main>
</body>
</html>
