<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>حباب | ارزش ذاتی طلا و نقره</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
  <!-- آیکون‌ها از jsDelivr — دامنهٔ fonts.googleapis.com از ایران بدون فیلترشکن باز نمی‌شود -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/material-symbols@latest/rounded.css">
  <!-- با هر آپدیت، عدد v را یک واحد بالا ببر تا مرورگر کاربر نسخهٔ جدید را بدون پاک کردن کش بگیرد -->
  <link rel="stylesheet" href="styles.css?v=0.9">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0B57D0">

  <!-- ایمپورت مستقیم باندل‌شده؛ بدون importmap تا در وب‌ویوهای قدیمی هم کار کند -->
  <script type="module" src="https://esm.run/@material/web/all.js"></script>
  <script type="module" src="app.js?v=0.9"></script>
</head>
<body>
  <main class="card">
    <header>
      <md-icon class="logo">bubble_chart</md-icon>
      <h1><span id="appName">حباب</span> <span id="verBadge" class="badge">v0.9 Beta</span></h1>
      <md-icon-button id="langBtn" title="English / فارسی"><md-icon>language</md-icon></md-icon-button>
      <md-icon-button id="themeBtn" title="پوستهٔ روشن/تاریک"><md-icon id="themeIcon">dark_mode</md-icon></md-icon-button>
    </header>
    <p class="subtitle" id="subtitle">اعلام ارزش ذاتی طلا و نقره</p>

    <!-- کارت وضعیت بازار جهانی -->
    <div id="marketCard" class="market">
      <md-icon id="marketIcon">schedule</md-icon>
      <div>
        <b id="marketLabel">در انتظار دریافت داده…</b>
        <span id="marketTimes"></span>
      </div>
    </div>

    <md-tabs id="nav">
      <!-- آیکون‌های اختصاصی تک‌رنگ: انگشتر برای طلا، شمش برای نقره — رنگ را از تم می‌گیرند -->
      <md-primary-tab inline-icon>
        <md-icon slot="icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 22a7 7 0 1 1 0-14 7 7 0 0 1 0 14Zm0-2.5a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Z"/><path d="M12 1.6 15 4.6l-3 3-3-3 3-3Z"/></svg></md-icon>
        <span id="tabGoldLabel">طلا</span>
      </md-primary-tab>
      <md-primary-tab inline-icon>
        <md-icon slot="icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8.8 4.5h6.4l2.4 4.6H6.4l2.4-4.6Z"/><path d="M4.3 13h6.4l2.4 4.6H1.9L4.3 13Z"/><path d="M13.3 13h6.4l2.4 4.6H10.9l2.4-4.6Z"/></svg></md-icon>
        <span id="tabSilverLabel">نقره</span>
      </md-primary-tab>
    </md-tabs>

    <section id="view-gold">

    <md-outlined-text-field id="ons" label="انس جهانی طلا (دلار)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">public</md-icon>
      <md-icon-button id="fetchXau" slot="trailing-icon" title="دریافت از API"><md-icon>sync</md-icon></md-icon-button>
    </md-outlined-text-field>

    <md-outlined-text-field id="usd" label="قیمت دلار بازار آزاد (تومان)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">attach_money</md-icon>
    </md-outlined-text-field>

    <section id="out">
      <div class="row"><span id="rowMesghalLabel">ارزش ذاتی مثقال</span><b id="zatiMesghal"></b></div>
      <div class="row"><span id="rowGeramLabel">ارزش ذاتی گرم ۱۸ عیار</span><b id="zatiGeram"></b></div>
      <md-text-button id="share"><md-icon slot="icon">share</md-icon><span id="shareLabel">اشتراک نتیجه</span></md-text-button>
    </section>

    </section>

    <section id="view-silver" hidden>

    <md-outlined-text-field id="xag" label="انس جهانی نقره (دلار)" inputmode="numeric" supporting-text=" ">
      <md-icon slot="leading-icon">public</md-icon>
      <md-icon-button id="fetchXag" slot="trailing-icon" title="دریافت از API"><md-icon>sync</md-icon></md-icon-button>
    </md-outlined-text-field>

    <div id="silverOut" class="row" style="display:none"><span id="silverRowLabel">ارزش ذاتی شمش یک‌کیلویی ۹۹۹</span><b id="silverVal"></b></div>

    </section>


  </main>
</body>
</html>
